<div class="flex justify-center gap-3 pt-10">
  <button 
    class="btn dark-button"
    (click)="get500Error()"
  >
    Test 500 Error
  </button>
  <button 
    class="btn dark-button"
    (click)="get400Error()"
  >
    Test 400 Error
  </button>
  <button 
    class="btn dark-button"
    (click)="get401Error()"
  >
    Test 401 Error
  </button>
  <button 
    class="btn dark-button"
    (click)="get404Error()"
  >
    Test 404 Error
  </button>
  <button 
    class="btn dark-button"
    (click)="get400ValidationError()"
  >
    Test Validation Error
  </button>
</div>

@if (validationErrors().length > 0) {
  <div class="card bg-grey-4 flex mt-5 rounded w-1/2 p-3 mx-auto">
    <ul class="flex flex-col text-main-dark space-y-2">
      @for (error of validationErrors(); track $index) {
        <li class="font-medium">
          {{error}}
        </li>
      }
    </ul>
  </div>
}
