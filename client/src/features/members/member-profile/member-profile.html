@if (member(); as member) {
  <div class="flex flex-col gap-3">
    <div class="flex gap-3">
      <span class="font-medium">
        Member since:
      </span>
      <span>
        {{member.lastActive}}
      </span>
    </div>
    <h3 class="text-lg font-medium text-primary">
      About {{member.displayName}}
    </h3>
    <div>
      {{member.description}}
    </div>
  </div>
}
